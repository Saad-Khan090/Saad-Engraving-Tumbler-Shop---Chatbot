<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saad Engraving — Chat Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b1120;
    --surface:   #111827;
    --card:      #1a2236;
    --border:    #1f2d45;
    --accent:    #3b82f6;
    --accent2:   #60a5fa;
    --glow:      #3b82f633;
    --cream:     #e8edf5;
    --muted:     #64748b;
    --user-bg:   #1e3a5f;
    --bot-bg:    #131e30;
    --chip-bg:   #141e2e;
    --engrv:     #f59e0b;
    --engrv-dim: #92400e;
    --font-head: 'Sora', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 700px;
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo-wrap {
    position: relative;
    width: 46px; height: 46px;
    flex-shrink: 0;
  }
  .logo-ring {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1d3a6e, #0f1f3d);
    border: 1.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 18px var(--glow);
  }
  .pulse-ring {
    position: absolute;
    inset: -4px;
    border-radius: 18px;
    border: 1.5px solid var(--accent);
    opacity: 0.3;
    animation: pulse-border 2.5s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50%       { opacity: 0.45; transform: scale(1.06); }
  }

  .header-text h1 {
    font-family: var(--font-head);
    font-size: 16px;
    color: var(--cream);
    letter-spacing: -0.2px;
  }
  .header-text h1 span { color: var(--engrv); }
  .header-text p {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    margin-right: 5px;
    box-shadow: 0 0 6px #22c55e99;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* ── WRAPPER ── */
  .wrapper {
    width: 100%;
    max-width: 700px;
    flex: 1;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 74px);
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.22s ease;
  }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.bot {
    background: linear-gradient(135deg, #1d3a6e, #0f1f3d);
    border: 1px solid var(--accent);
    color: var(--accent2);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.5px;
  }
  .avatar.user {
    background: var(--user-bg);
    border: 1px solid #2d4f7c;
    color: var(--cream);
  }

  .bubble {
    max-width: 76%;
    padding: 11px 16px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.65;
    white-space: pre-line;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--cream);
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #2d4f7c;
    border-top-right-radius: 4px;
    color: #cce0ff;
  }

  /* ── TIMESTAMP ── */
  .ts {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg.user .ts { text-align: right; }

  /* ── CHIPS ── */
  .chips-wrap {
    padding: 8px 20px 10px;
    border-top: 1px solid var(--border);
  }
  .chips-label {
    font-size: 10.5px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    background: var(--chip-bg);
    border: 1px solid var(--border);
    color: #94a3b8;
    font-family: var(--font-body);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    background: #1a2a40;
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 12px 20px 18px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .input-bar input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 13.5px;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-bar input::placeholder { color: var(--muted); }
  .input-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .send-btn {
    background: var(--accent);
    border: none;
    width: 42px; height: 42px;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2563eb; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; fill: #fff; }

  /* ── TYPING ── */
  .typing-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    padding: 12px 18px;
    display: inline-flex;
    gap: 5px;
    align-items: center;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .dot:nth-child(1) { animation: bounce 1.2s 0.0s infinite; }
  .dot:nth-child(2) { animation: bounce 1.2s 0.2s infinite; }
  .dot:nth-child(3) { animation: bounce 1.2s 0.4s infinite; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); background: var(--muted); }
    40%         { transform: translateY(-6px); background: var(--accent2); }
  }

  /* ── DATE DIVIDER ── */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    position: relative;
    margin: 4px 0;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 38%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after  { right: 0; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="pulse-ring"></div>
      <div class="logo-ring">✦</div>
    </div>
    <div class="header-text">
      <h1>Saad <span>Engraving</span> Support</h1>
      <p><span class="status-dot"></span>Online — Owala · Stanley · Custom Laser Engraving</p>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="date-divider">Today</div>
  </div>

  <!-- QUICK CHIPS -->
  <div class="chips-wrap" id="chipsWrap">
    <div class="chips-label">Quick Questions</div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <input type="text" id="userInput" placeholder="Koi bhi sawaal poochein…" autocomplete="off"/>
    <button class="send-btn" id="sendBtn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const chatArea  = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const chipsWrap = document.getElementById('chipsWrap');
const chipsDiv  = document.getElementById('chips');
const sendBtn   = document.getElementById('sendBtn');

const quickChips = [
  "Kaunse brands sell karte ho?",
  "Engraving kaise hoti hai?",
  "Prices kya hain?",
  "Delivery kitne din mein?",
  "Order kaise karna hai?",
  "Pakistan mein deliver karte ho?",
  "Payment kaise karni hai?",
  "Return policy kya hai?",
  "Gift ke liye order kar sakte hain?",
  "Products original hain?",
  "Bulk order discount?",
  "Colors kaunse available hain?",
];

function getTime() {
  return new Date().toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(text, role) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'bot' ? 'SE' : '👤';

  const col = document.createElement('div');

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;

  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = getTime();

  col.appendChild(bub);
  col.appendChild(ts);

  msg.appendChild(av);
  msg.appendChild(col);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing';

  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'SE';

  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  msg.appendChild(av);
  msg.appendChild(bub);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

async function handleSend(text) {
  const val = (text || userInput.value).trim();
  if (!val) return;
  userInput.value = '';
  sendBtn.disabled = true;

  chipsWrap.style.display = 'none';
  addMsg(val, 'user');

  const typing = showTyping();

  try {
    const res  = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: val })
    });
    const data = await res.json();
    typing.remove();
    addMsg(data.reply, 'bot');
  } catch (err) {
    typing.remove();
    addMsg("Oops! Server se connection nahi ho raha. Please refresh karein. 🔄", 'bot');
  }

  chipsWrap.style.display = 'block';
  sendBtn.disabled = false;
  userInput.focus();
}

// Build chips
quickChips.forEach(q => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = q;
  btn.onclick = () => handleSend(q);
  chipsDiv.appendChild(btn);
});

// Enter key
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

// Welcome message on load
setTimeout(() => {
  addMsg(
    "Assalam o Alaikum! 👋 Saad Engraving mein aapka khoosh amdeed!\n\nMain aapki help kar sakta hoon Owala & Stanley tumblers, custom laser engraving, pricing, delivery aur bhi bohot kuch ke baare mein.\n\nNeeche se quick question choose karein ya khud type karein! 😊",
    'bot'
  );
}, 400);
</script>
</body>
</html>
